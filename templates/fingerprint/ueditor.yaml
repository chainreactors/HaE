id: hae-ueditor

info:
  name: Ueditor
  severity: low
  description: Detect UEditor rich text editor
  tags: hae, fingerprint
  metadata:
    color: green
    scope: response body
    engine: dfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'ueditor'
        case-insensitive: true
    extractors:
      - type: regex
        name: ueditor
        regex:
          - '(?i)(ueditor\.(config|all)\.js)'
