id: hae-linkfinder

info:
  name: Linkfinder
  severity: info
  description: Extract URLs and endpoints from JavaScript responses
  tags: hae, other
  metadata:
    color: gray
    scope: response body
    engine: nfa
    sensitive: true
    loaded: true

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: linkfinder
        regex:
          - "(?:\"|'|`)(((?:[a-zA-Z]{1,10}://|//)[^\"'/]{1,}\\.[a-zA-Z]{2,}[^\"']{0,})|((?:/|\\.\\./|\\./)[ ^\"'><,;|*()(%%$^/\\\\\\[\\]][^\"'><,;|()]{1,})|([a-zA-Z0-9_\\-/]{1,}/[a-zA-Z0-9_\\-/]{1,}\\.(?:[a-zA-Z]{1,4}|action)(?:[\\?|#][^\"|']{0,}|))|([a-zA-Z0-9_\\-/]{1,}/[a-zA-Z0-9_\\-/]{3,}(?:[\\?|#][^\"|']{0,}|))|([a-zA-Z0-9_\\-]{1,}\\.(?:\\w)(?:[\\?|#][^\"|']{0,}|)))(?:\"|'|`)"
