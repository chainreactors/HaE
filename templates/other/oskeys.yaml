id: hae-oskeys

info:
  name: OSKeys
  severity: info
  description: Extract object storage key paths from XML responses
  tags: hae, other
  metadata:
    color: gray
    scope: response body
    engine: nfa
    sensitive: true
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - '<Key>'
    extractors:
      - type: regex
        name: oskeys
        regex:
          - '<Key>(.*?)</Key>'
