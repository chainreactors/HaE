id: hae-sensitive-field

info:
  name: Sensitive Field
  severity: medium
  description: Detect generic sensitive field assignments (key, secret, token, etc.)
  tags: hae, sensitive-info
  metadata:
    color: yellow
    scope: response
    engine: nfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'key'
          - 'secret'
          - 'token'
          - 'config'
          - 'auth'
          - 'access'
          - 'admin'
          - 'ticket'
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: sensitive-field
        regex:
          - "(?i)(((|\\\\)(|'|\")(|[\\.\\ w]{1,32})(key|secret|token|config|auth|access|admin|ticket)(|[\\.\\ w]{1,32})(|\\\\)(|'|\")(\\n          |)(:|[=]{1,3}|![=]{1,2}|[\\)]{0,1}\\.val\\()( |)(|\\\\)('|\")([^'\"]+?)(|\\\\)('|\")(|,|\\)))|((|\\\\)('|\")([^'\"]+?)(|\\\\)('|\")(|\\\\)(|'|\")(\\n          |)(:|[=]{1,3}|![=]{1,2})( |)(|[\\.\\ w]{1,32})(key|secret|token|config|auth|access|admin|ticket)(|[\\.\\ w]{1,32})(|\\\\)(|'|\")))"
