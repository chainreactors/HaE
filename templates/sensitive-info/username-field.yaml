id: hae-username-field

info:
  name: Username Field
  severity: low
  description: Detect username/account field assignments in responses
  tags: hae, sensitive-info
  metadata:
    color: green
    scope: response body
    engine: nfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'user'
          - 'name'
          - 'username'
          - 'account'
          - 'creator'
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: username-field
        regex:
          - "(?i)(((|\\\\)(|'|\")(|[\\.\\ w]{1,32})(([u](ser|name|sername))|(account)|((((create|update)((d|r)|(by|on|at)))|(creator))))(|[\\.\\ w]{1,32})(|\\\\)(|'|\")(\\n          |)(:|[=]{1,3}|![=]{1,2}|[\\)]{0,1}\\.val\\()( |)(|\\\\)('|\")([^'\"]+?)(|\\\\)('|\")(|,|\\)))|((|\\\\)('|\")([^'\"]+?)(|\\\\)('|\")(|\\\\)(|'|\")(\\n          |)(:|[=]{1,3}|![=]{1,2})( |)(|[\\.\\ w]{1,32})(([u](ser|name|sername))|(account)|((((create|update)((d|r)|(by|on|at)))|(creator))))(|[\\.\\ w]{1,32})(|\\\\)(|'|\")))"
