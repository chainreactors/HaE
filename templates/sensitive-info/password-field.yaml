id: hae-password-field

info:
  name: Password Field
  severity: medium
  description: Detect password field assignments in responses
  tags: hae, sensitive-info
  metadata:
    color: yellow
    scope: response body
    engine: nfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'pass'
          - 'pwd'
          - 'passwd'
          - 'password'
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: password-field
        regex:
          - "(?i)(((|\\\\)(|'|\")(|[\\.\\ w]{1,32})([p](ass|wd|asswd|assword))(|[\\.\\ w]{1,32})(|\\\\)(|'|\")(\\n          |)(:|[=]{1,3}|![=]{1,2}|[\\)]{0,1}\\.val\\()( |)(|\\\\)('|\")([^'\"]+?)(|\\\\)('|\")(|,|\\)))|((|\\\\)('|\")([^'\"]+?)(|\\\\)('|\")(|\\\\)(|'|\")(\\n          |)(:|[=]{1,3}|![=]{1,2})( |)(|[\\.\\ w]{1,32})([p](ass|wd|asswd|assword))(|[\\.\\ w]{1,32})(|\\\\)(|'|\")))"
