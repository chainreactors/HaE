id: hae-authorization-header

info:
  name: Authorization Header
  severity: medium
  description: Extract Basic/Bearer authorization tokens
  tags: hae, sensitive-info
  metadata:
    color: yellow
    scope: response body
    engine: nfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'basic '
          - 'bearer '
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: authorization-header
        regex:
          - '(?i)((basic [a-z0-9=:_\+\/-]{5,100})|(bearer [a-z0-9_.=:_\+\/-]{5,100}))'
