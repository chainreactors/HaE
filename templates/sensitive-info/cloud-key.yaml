id: hae-cloud-key

info:
  name: Cloud Key
  severity: medium
  description: Detect cloud provider access keys (AWS, Aliyun, etc.)
  tags: hae, sensitive-info
  metadata:
    color: yellow
    scope: any
    engine: nfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'access'
          - 'LTAI'
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: cloud-key
        regex:
          - '(?i)(((access)(|-|_)(key)(|-|_)(id|secret))|(LTAI[a-z0-9]{12,20}))'
