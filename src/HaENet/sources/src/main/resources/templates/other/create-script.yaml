id: hae-create-script

info:
  name: Create Script
  severity: low
  description: Extract key-value pairs from dynamic script creation patterns
  tags: hae, other
  metadata:
    color: green
    scope: response body
    engine: nfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: regex
        regex:
          - '(?i)(\{[^{}]*\}\s*\[[^\s]*\]\s*\+\s*"[^\s]*\.js")'
    extractors:
      - type: regex
        name: create-script
        regex:
          - '"?([\w].*?)"?:"(.*?)"'
        regex-group: 1
