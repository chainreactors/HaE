id: hae-request-uri

info:
  name: Request URI
  severity: info
  description: Extract request URI paths excluding static resources
  tags: hae, other
  metadata:
    color: gray
    scope: request line
    engine: nfa
    sensitive: false
    loaded: false

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: request-uri
        regex:
          - '(?i) ((?!.*\.js(\?.*)?$)(.*?[^.js$])) '
