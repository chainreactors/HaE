id: hae-url-schemes

info:
  name: URL Schemes
  severity: medium
  description: Detect non-HTTP URL schemes (ftp, ldap, etc.)
  tags: hae, other
  metadata:
    color: yellow
    scope: response body
    engine: nfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: url-schemes
        regex:
          - '(?i)(\b(?![\w]{0,10}?https?://)(([A-Za-z0-9-\.]{1,20})://([-\w+&@#/%?=~_|!:,.;]*[-\w+&@#/%=~_|])?))'
