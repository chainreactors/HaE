id: hae-source-map

info:
  name: Source Map
  severity: info
  description: Detect JavaScript source map file references
  tags: hae, other
  metadata:
    color: pink
    scope: response body
    engine: dfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - '.js.map'
        case-insensitive: true
    extractors:
      - type: regex
        name: source-map
        regex:
          - '(?i)(\.js\.map)'
