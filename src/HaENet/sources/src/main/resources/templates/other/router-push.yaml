id: hae-router-push

info:
  name: Router Push
  severity: info
  description: Detect Vue.js router push calls
  tags: hae, other
  metadata:
    color: magenta
    scope: response body
    engine: dfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - '$router.push'
        case-insensitive: true
    extractors:
      - type: regex
        name: router-push
        regex:
          - '(?i)(\$router\.push)'
