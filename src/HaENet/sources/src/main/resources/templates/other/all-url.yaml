id: hae-all-url

info:
  name: All URL
  severity: info
  description: Extract all HTTP/HTTPS URLs from responses
  tags: hae, other
  metadata:
    color: gray
    scope: response body
    engine: nfa
    sensitive: true
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'http://'
          - 'https://'
        condition: or
    extractors:
      - type: regex
        name: all-url
        regex:
          - '(https?://[-A-Za-z0-9+&@#/%?=~_|!:,.;一-鿿]+[-A-Za-z0-9+&@#/%=~_|])'
