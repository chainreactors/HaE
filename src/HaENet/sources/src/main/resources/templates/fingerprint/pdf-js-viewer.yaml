id: hae-pdf-js-viewer

info:
  name: PDF.js Viewer
  severity: low
  description: Detect PDF.js viewer component
  tags: hae, fingerprint
  metadata:
    color: green
    scope: response body
    engine: dfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'pdf.worker'
        case-insensitive: true
    extractors:
      - type: regex
        name: pdf-js-viewer
        regex:
          - '(?i)(pdf.worker)'
