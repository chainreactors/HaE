id: hae-druid

info:
  name: Druid
  severity: high
  description: Detect Alibaba Druid monitoring console
  tags: hae, fingerprint
  metadata:
    color: orange
    scope: response body
    engine: dfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'Druid Stat Index'
        case-insensitive: true
    extractors:
      - type: regex
        name: druid
        regex:
          - '(?i)(Druid Stat Index)'
