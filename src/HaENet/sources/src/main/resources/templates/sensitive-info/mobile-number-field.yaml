id: hae-mobile-number-field

info:
  name: Mobile Number Field
  severity: low
  description: Detect mobile/phone number field assignments
  tags: hae, sensitive-info
  metadata:
    color: green
    scope: response body
    engine: nfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'mobile'
          - 'phone'
          - 'concat'
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: mobile-number-field
        regex:
          - "(?i)(((|\\\\)(|'|\")(|[\\.\\ w]{1,32})(mobile|phone|sjh|shoujihao|concat)(|[\\.\\ w]{1,32})(|\\\\)(|'|\")(\\n          |)(:|[=]{1,3}|![=]{1,2}|[\\)]{0,1}\\.val\\()( |)(|\\\\)('|\")([^'\"]+?)(|\\\\)('|\")(|,|\\)))|((|\\\\)('|\")([^'\"]+?)(|\\\\)('|\")(|\\\\)(|'|\")(\\n          |)(:|[=]{1,3}|![=]{1,2})( |)(|[\\.\\ w]{1,32})(mobile|phone|sjh|shoujihao|concat)(|[\\.\\ w]{1,32})(|\\\\)(|'|\")))"
