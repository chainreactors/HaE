id: hae-wecom-key

info:
  name: WeCom Key
  severity: low
  description: Detect WeCom (Enterprise WeChat) credential fields
  tags: hae, sensitive-info
  metadata:
    color: green
    scope: response body
    engine: dfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - 'corpid'
          - 'corpsecret'
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: wecom-key
        regex:
          - '(?i)((corp)(id|secret))'
