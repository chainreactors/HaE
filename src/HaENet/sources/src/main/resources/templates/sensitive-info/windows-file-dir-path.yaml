id: hae-windows-file-dir-path

info:
  name: Windows File/Dir Path
  severity: low
  description: Extract Windows filesystem paths
  tags: hae, sensitive-info
  metadata:
    color: green
    scope: response
    engine: nfa
    sensitive: true
    loaded: true

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: windows-file-dir-path
        regex:
          - '[^\w]([a-zA-Z]:\\\\?(?:[^<>:/\\|?*]+\\\\?)*)([^<>:/\\|?*]+(?:\.[^<>:/\\|?*]+)?)'
