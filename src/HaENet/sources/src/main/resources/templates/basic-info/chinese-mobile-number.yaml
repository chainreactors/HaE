id: hae-chinese-mobile-number

info:
  name: Chinese Mobile Number
  severity: high
  description: Extract Chinese mobile phone numbers
  tags: hae, basic-info
  metadata:
    color: orange
    scope: response body
    engine: nfa
    sensitive: false
    loaded: true

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: chinese-mobile-number
        regex:
          - '(?i)[^\w]((?:(?:\+|0{0,2})86)?1(?:(?:3[\d])|(?:4[5-79])|(?:5[0-35-9])|(?:6[5-7])|(?:7[0-8])|(?:8[\d])|(?:9[189]))\d{8})[^\w]'
