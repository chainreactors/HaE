id: hae-chinese-idcard

info:
  name: Chinese IDCard
  severity: high
  description: Extract Chinese national ID card numbers
  tags: hae, basic-info
  metadata:
    color: orange
    scope: response body
    engine: nfa
    sensitive: true
    loaded: true

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: chinese-idcard
        regex:
          - '[^0-9]((\d{8}(0\d|10|11|12)([0-2]\d|30|31)\d{3}$)|(\d{6}(18|19|20)\d{2}(0[1-9]|10|11|12)([0-2]\d|30|31)\d{3}(\d|X|x)))[^0-9]'
