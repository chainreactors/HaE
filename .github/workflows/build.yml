name: Build HaE with Proton + Fingers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-engine:
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, goos: linux,   goarch: amd64, jna: linux-x86-64,    zig_target: x86_64-linux-gnu}
          - {os: ubuntu-latest, goos: linux,   goarch: arm64, jna: linux-aarch64,    zig_target: aarch64-linux-gnu}
          - {os: ubuntu-latest, goos: windows, goarch: amd64, jna: win32-x86-64,    zig_target: x86_64-windows-gnu}
          - {os: macos-latest,  goos: darwin,  goarch: amd64, jna: darwin-x86-64,    zig_target: ""}
          - {os: macos-latest,  goos: darwin,  goarch: arm64, jna: darwin-aarch64,   zig_target: ""}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Zig
        if: matrix.zig_target != ''
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.13.0'

      - name: Build engine
        working-directory: engine
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.zig_target != '' && format('zig cc -target {0}', matrix.zig_target) || '' }}
          CXX: ${{ matrix.zig_target != '' && format('zig c++ -target {0}', matrix.zig_target) || '' }}
          GONOSUMCHECK: 'github.com/chainreactors/*'
          GONOSUMDB: 'github.com/chainreactors/*'
        run: |
          mkdir -p out/${{ matrix.jna }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LIBNAME="engine.dll"
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            LIBNAME="libengine.dylib"
          else
            LIBNAME="libengine.so"
          fi
          go build -tags passive_only -buildmode=c-shared -ldflags="-s -w" -o "out/${{ matrix.jna }}/${LIBNAME}" .
          rm -f out/${{ matrix.jna }}/*.h
          ls -lh out/${{ matrix.jna }}/

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.jna }}
          path: engine/out/

  build-jar:
    needs: build-engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Download all natives
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true
          path: src/HaENet/sources/natives

      - name: Verify natives
        run: ls -lhR src/HaENet/sources/natives/

      - name: Build proton-hae SDK
        run: |
          git clone --depth 1 https://github.com/chainreactors/proton /tmp/proton
          cd /tmp/proton/sdk/java/proton-hae
          mvn package -q -DskipTests
          mkdir -p $GITHUB_WORKSPACE/src/HaENet/sources/libs
          cp target/proton-hae-*.jar $GITHUB_WORKSPACE/src/HaENet/sources/libs/

      - name: Build all JARs
        working-directory: src/HaENet/sources
        run: gradle jarAll

      - name: List artifacts
        working-directory: src/HaENet/sources
        run: ls -lh build/libs/*.jar

      - uses: actions/upload-artifact@v4
        with:
          name: HaE-jars
          path: src/HaENet/sources/build/libs/*.jar

      - name: Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: src/HaENet/sources
        run: |
          TAG="v$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          gh release create "$TAG" \
            --title "HaE with Proton + Fingers Engine $TAG" \
            --notes "HaE with Proton + Fingers Engine" \
            build/libs/HaE.jar \
            build/libs/HaE-linux-x86-64.jar \
            build/libs/HaE-linux-aarch64.jar \
            build/libs/HaE-win32-x86-64.jar \
            build/libs/HaE-darwin-x86-64.jar \
            build/libs/HaE-darwin-aarch64.jar
