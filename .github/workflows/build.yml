name: Build HaE with Proton

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  HAE_DIR: src/HaENet/sources

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Download proton natives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p $HAE_DIR/natives
          gh release download --repo chainreactors/proton --pattern 'proton-natives.tar.gz' --dir /tmp
          tar xzf /tmp/proton-natives.tar.gz -C $HAE_DIR/natives/
          ls -lhR $HAE_DIR/natives/

      - name: Build proton-hae SDK
        run: |
          git clone --depth 1 https://github.com/chainreactors/proton /tmp/proton
          cd /tmp/proton/sdk/java/proton-hae
          mvn package -q -DskipTests
          mkdir -p $GITHUB_WORKSPACE/$HAE_DIR/libs
          cp target/proton-hae-*.jar $GITHUB_WORKSPACE/$HAE_DIR/libs/
          ls -lh $GITHUB_WORKSPACE/$HAE_DIR/libs/

      - name: Build all JARs
        working-directory: ${{ env.HAE_DIR }}
        run: gradle jarAll

      - name: List artifacts
        working-directory: ${{ env.HAE_DIR }}
        run: ls -lh build/libs/*.jar

      - uses: actions/upload-artifact@v4
        with:
          name: HaE-jars
          path: ${{ env.HAE_DIR }}/build/libs/*.jar

      - name: Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: ${{ env.HAE_DIR }}
        run: |
          TAG="v$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          gh release create "$TAG" \
            --title "HaE with Proton Engine $TAG" \
            --notes "$(cat <<'NOTES'
          HaE Burp extension with Proton regex engine.

          | File | Description |
          |------|-------------|
          | `HaE.jar` | Fat JAR — all platforms (Linux/Windows/macOS) |
          | `HaE-linux-x86-64.jar` | Standalone — Linux amd64 |
          | `HaE-linux-aarch64.jar` | Standalone — Linux arm64 |
          | `HaE-win32-x86-64.jar` | Standalone — Windows amd64 |
          | `HaE-darwin-x86-64.jar` | Standalone — macOS Intel |
          | `HaE-darwin-aarch64.jar` | Standalone — macOS Apple Silicon |
          NOTES
          )" \
            build/libs/HaE.jar \
            build/libs/HaE-linux-x86-64.jar \
            build/libs/HaE-linux-aarch64.jar \
            build/libs/HaE-win32-x86-64.jar \
            build/libs/HaE-darwin-x86-64.jar \
            build/libs/HaE-darwin-aarch64.jar
